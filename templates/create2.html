{% extends "layout.html" %}
{% block css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/create2.css') }}">
{% endblock %}

{% block body %}
<div class="c2-page">
    <div class="c2-title">
        <h1>Rent Agreement</h1>
        <div class="c2-underline"></div>
    </div>

    <div class="c2-container">

        <div class="c2-steps">

            <div class="c2-step">
                <div class="c2-circle {% if session.get('owner_name') %}completed-circle{% endif %}"></div>
                <a href="{{ url_for('create') }}">Owner Details</a>
            </div>

            <div class="c2-step">
                <div class="c2-circle {% if session.get('tenant_name') %}completed-circle{% endif %}"></div>
                <a href="{{ url_for('create1') }}">Tenant Details</a>
            </div>

            <div class="c2-step">
                <div class="c2-circle c2-active"></div>
                <a href="{{ url_for('create2') }}" class="c2-active-text">Property Details</a>
            </div>

            <div class="c2-step">
                <div class="c2-circle"></div>
                <a href="{{ url_for('create3') }}">Agreement Terms</a>
            </div>

            <div class="c2-step">
                <div class="c2-circle"></div>
                <a href="{{ url_for('create4') }}">Annexures</a>
            </div>

        </div>

        <div class="c2-card">
            <h2>Property Details</h2>
            <div class="c2-subtitle">
                Fill in details of the property being rented.
            </div>

            <form action="{{ url_for('create2') }}" method="POST">

                <label>State*</label>
                <input type="text" name="prop_state" value="Himachal Pradesh" readonly
                    style="background-color: #f1f5f9; color: #64748b; cursor: not-allowed; font-weight: 500;" required>

                <label>City*</label>
                <select name="prop_city" required>
                    <option value="" disabled {% if not session.get('prop_city') %}selected{% endif %}>Select City
                    </option>
                    <option value="Shimla" {% if session.get('prop_city')=='Shimla' %}selected{% endif %}>Shimla
                    </option>
                    <option value="Dharamshala" {% if session.get('prop_city')=='Dharamshala' %}selected{% endif %}>
                        Dharamshala</option>
                    <option value="Manali" {% if session.get('prop_city')=='Manali' %}selected{% endif %}>Manali
                    </option>
                    <option value="Mandi" {% if session.get('prop_city')=='Mandi' %}selected{% endif %}>Mandi</option>
                    <option value="Kangra" {% if session.get('prop_city')=='Kangra' %}selected{% endif %}>Kangra
                    </option>
                    <option value="Palampur" {% if session.get('prop_city')=='Palampur' %}selected{% endif %}>Palampur
                    </option>
                    <option value="Chamba" {% if session.get('prop_city')=='Chamba' %}selected{% endif %}>Chamba
                    </option>
                    <option value="Bilaspur" {% if session.get('prop_city')=='Bilaspur' %}selected{% endif %}>Bilaspur
                    </option>
                    <option value="Sundernagar" {% if session.get('prop_city')=='Sundernagar' %}selected{% endif %}>
                        Sundernagar</option>
                    <option value="Nurpur" {% if session.get('prop_city')=='Nurpur' %}selected{% endif %}>Nurpur
                    </option>
                    <option value="Hamirpur" {% if session.get('prop_city')=='Hamirpur' %}selected{% endif %}>Hamirpur
                    </option>
                    <option value="Solan" {% if session.get('prop_city')=='Solan' %}selected{% endif %}>Solan</option>
                    <option value="Kullu" {% if session.get('prop_city')=='Kullu' %}selected{% endif %}>Kullu</option>
                    <option value="Baddi" {% if session.get('prop_city')=='Baddi' %}selected{% endif %}>Baddi</option>
                    <option value="Nahan" {% if session.get('prop_city')=='Nahan' %}selected{% endif %}>Nahan</option>
                    <option value="Paonta" {% if session.get('prop_city')=='Paonta' %}selected{% endif %}>Paonta
                    </option>
                    <option value="Yol" {% if session.get('prop_city')=='Yol' %}selected{% endif %}>Yol</option>
                    <option value="Una" {% if session.get('prop_city')=='Una' %}selected{% endif %}>Una</option>
                    <option value="Nagrota Bagwan" {% if session.get('prop_city')=='Nagrota Bagwan' %}selected{% endif
                        %}>Nagrota Bagwan</option>
                </select>

                <label>Pincode*</label>
                <input type="text" name="prop_pincode" value="{{ session.get('prop_pincode', '') }}"
                    pattern="17[0-9]{4}" maxlength="6"
                    title="Himachal Pradesh Pincodes must be exactly 6 digits and start with '17' (e.g., 176215)"
                    required>

                <label>House & Street Address*</label>
                <input type="text" name="prop_address" value="{{ session.get('prop_address', '') }}"
                    placeholder="Enter full address of property" style="text-transform: uppercase;" minlength="10"
                    required>

                <div class="c2-button-box">
                    <button type="submit">Save & Continue</button>
                </div>

            </form>

        </div>

    </div>
</div>
{% endblock %}
