{% extends "layout.html" %}
{% block css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/create.css') }}">
{% endblock %}
{% block body %}

<div class="centered-column multi-step-form-page">
    <div class="multi-step-form-header">
        <h1>Rent Agreement</h1>
        <div class="multi-step-form-underline"></div>
    </div>

    <div class="form-layout-cols">
        <div class="sidebar-steps-list">
            <div class="step-item-wrapper active">
                <div class="step-icon-circle"></div><span class="active-text">Owner Details</span>
            </div>
            <div class="step-item-wrapper">
                <div class="step-icon-circle"></div><a href="{{ url_for('create1') }}">Tenant Details</a>
            </div>
            <div class="step-item-wrapper">
                <div class="step-icon-circle"></div><a href="{{ url_for('create2') }}">Property Details</a>
            </div>
            <div class="step-item-wrapper">
                <div class="step-icon-circle"></div><a href="{{ url_for('create3') }}">Agreement Terms</a>
            </div>
            <div class="step-item-wrapper">
                <div class="step-icon-circle"></div><a href="{{ url_for('create4') }}">Annexures</a>
            </div>
        </div>

        <div class="content-form-card">
            <h2>Who owns the property?</h2>
            <div class="subtitle">Fill in details of the owner/lessor/landlord.</div>

            <form action="{{ url_for('create') }}" method="POST" class="multi-step-vertical-form">

                <label>Full Name*</label>
                <input type="text" name="owner_name" value="{{ session.get('owner_name', '') }}"
                    style="text-transform: uppercase;" required>

                <label>Mobile Number*</label>
                <input type="tel" name="owner_mobile" value="{{ session.get('owner_mobile', '') }}"
                    pattern="[6-9][0-9]{9}" maxlength="10"
                    title="Please enter a valid 10-digit Indian mobile number starting with 6, 7, 8, or 9" required>

                <label>Address*</label>
                <input type="text" name="owner_address" value="{{ session.get('owner_address', '') }}"
                    placeholder="Enter Owner's full address with pincode" style="text-transform: uppercase;"
                    minlength="10" pattern=".*[1-9][0-9]{5}.*"
                    title="Please type your full address AND include a valid 6-digit Pincode (e.g., 176215)" required>

                <div class="aligned-action-footer">
                    <button type="submit">Save & Continue</button>
                </div>
            </form>
        </div>
    </div>
</div>
