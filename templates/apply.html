<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HimRooms Form</title>

<style>
/* Basic page styling */
body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #f8f9fa; /* slightly lighter background */
    margin: 0;
    padding: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

/* The form container */
.form-container {
    background: #ffffff;
    width: 100%;
    max-width: 650px;
    padding: 40px;
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1); /* Softer shadow */
    box-sizing: border-box;
    margin: 20px;
}

.form-container h2 {
    margin-top: 0;
    margin-bottom: 24px;
    color: #333;
    font-size: 1.5rem;
}

.form-alert {
    border-radius: 8px;
    padding: 12px 14px;
    margin-bottom: 18px;
    font-size: 14px;
    line-height: 1.4;
}

.form-alert.success {
    background: #ecfdf5;
    color: #065f46;
    border: 1px solid #a7f3d0;
}

.form-alert.error {
    background: #fef2f2;
    color: #991b1b;
    border: 1px solid #fecaca;
}

/* Updated close button to be a "Back" button */
.back-btn {
    text-decoration: none;
    color: #9ca3af;
    font-size: 0.9rem;
    display: inline-block;
    margin-bottom: 16px;
    transition: color 0.2s;
}

.back-btn:hover {
    color: #4b5563;
}

.form-row {
    display: flex;
    gap: 20px;
    margin-bottom: 20px;
}

.form-group {
    flex: 1;
    display: flex;
    flex-direction: column;
}

label {
    margin-bottom: 8px;
    font-size: 13px;
    font-weight: 500;
    color: #4b5563;
}

input, select {
    padding: 12px;
    border-radius: 8px;
    border: 1px solid #e5e7eb;
    background: #f9fafb; 
    font-size: 14px;
    color: #374151;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
}

input:focus, select:focus {
    border-color: #10b981;
    box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1); 
}

.checkbox {
    display: flex;
    align-items: center;
    margin-top: 24px;
    font-size: 13px;
    color: #4b5563;
}

.checkbox input {
    margin-right: 8px;
    cursor: pointer;
}

.checkbox a {
    color: #10b981;
    text-decoration: none;
}

.checkbox a:hover {
    text-decoration: underline;
}

.submit-container {
    margin-top: 32px;
}

.submit-btn {
    width: 100%; /* Makes button full width */
    padding: 14px 24px;
    background: #10b981;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
}

.submit-btn:hover {
    background: #059669;
}

@media (max-width: 600px) {
    .form-row {
        flex-direction: column;
        gap: 16px;
        margin-bottom: 16px;
    }
    .form-container {
        padding: 24px;
    }
}
</style>
</head>

<body>

<div class="form-container">
    
    <a href="{{ url_for('home') }}" class="back-btn">← Back to Home</a>
    
    <h2>Enter your details</h2>

    {% if success %}
    <div class="form-alert success">{{ success }}</div>
    {% endif %}

    {% if error %}
    <div class="form-alert error">{{ error }}</div>
    {% endif %}

    <form action="{{ url_for('apply') }}" method="POST">
        
        <div class="form-row">
            <div class="form-group">
                <label>First Name</label>
                <input type="text" name="first_name" value="{{ form_data.first_name if form_data else '' }}" pattern="[A-Za-z][A-Za-z\s\.-]{1,49}" title="Enter a valid first name" required>
            </div>
            <div class="form-group">
                <label>Last Name (optional)</label>
                <input type="text" name="last_name" value="{{ form_data.last_name if form_data else '' }}" pattern="[A-Za-z][A-Za-z\s\.-]{1,49}" title="Enter a valid last name">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>Mobile</label>
                <input type="tel" name="mobile" value="{{ form_data.mobile if form_data else '' }}" pattern="[6-9][0-9]{9}" maxlength="10" minlength="10" inputmode="numeric" title="Enter valid 10-digit mobile starting with 6, 7, 8, or 9" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" value="{{ form_data.email if form_data else '' }}" pattern="^[A-Za-z0-9](?:[A-Za-z0-9._%+-]{0,62}[A-Za-z0-9])?@[A-Za-z0-9](?:[A-Za-z0-9-]{0,61}[A-Za-z0-9])?(?:\.[A-Za-z0-9](?:[A-Za-z0-9-]{0,61}[A-Za-z0-9])?)+$" title="Enter a valid email like name@example.com" required>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>City</label>
                <select name="city" required>
                    <option value="">Select city where property is located</option>
                    {% for city in city_options %}
                    <option value="{{ city.name }}" {% if form_data and form_data.city==city.name %}selected{% endif %}>{{ city.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>I am a</label>
                <select name="user_type" required>
                    <option value="">Please select one option</option>
                    <option value="Tenant" {% if form_data and form_data.user_type=='Tenant' %}selected{% endif %}>Tenant</option>
                    <option value="Owner" {% if form_data and form_data.user_type=='Owner' %}selected{% endif %}>Owner</option>
                    <option value="Broker" {% if form_data and form_data.user_type=='Broker' %}selected{% endif %}>Broker</option>
                </select>
            </div>
        </div>

        <div class="checkbox">
            <input type="checkbox" name="terms_accepted" required checked>
            <label>I accept <a href="{{ url_for('terms') }}">HimRoom's terms & conditions</a></label>
        </div>

        <div class="submit-container">
            <button type="submit" class="submit-btn">Submit Interest</button>
        </div>
    </form>
</div>

</body>
</html>
