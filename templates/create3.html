{% extends "layout.html" %}
{% block css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/create3.css') }}">
{% endblock %}

{% block body %}
<div class="c3-page">
    <div class="c2-title">
        <h1>Rent Agreement</h1>
        <div class="c2-underline"></div>
    </div>

    <div class="c3-container">

        <div class="c3-steps">

            <div class="c3-step">
                <div class="c3-circle {% if session.get('owner_name') %}completed-circle{% endif %}"></div>
                <a href="{{ url_for('create') }}">Owner Details</a>
            </div>

            <div class="c3-step">
                <div class="c3-circle {% if session.get('tenant_name') %}completed-circle{% endif %}"></div>
                <a href="{{ url_for('create1') }}">Tenant Details</a>
            </div>

            <div class="c3-step">
                <div class="c3-circle {% if session.get('prop_city') %}completed-circle{% endif %}"></div>
                <a href="{{ url_for('create2') }}">Property Details</a>
            </div>

            <div class="c3-step">
                <div class="c3-circle c3-active"></div>
                <a href="{{ url_for('create3') }}" class="c3-active-text">Agreement Terms</a>
            </div>

            <div class="c3-step">
                <div class="c3-circle"></div>
                <a href="{{ url_for('create4') }}">Annexures</a>
            </div>

        </div>

        <div class="c3-card">
            <h2>Agreement Terms</h2>

            <form action="{{ url_for('create3') }}" method="POST">

                <div class="c3-group">
                    <label>Monthly Rent (₹)*</label>
                    <input type="number" name="rent_amount" value="{{ session.get('rent_amount', '') }}" min="1"
                        placeholder="e.g. 10000" required>
                </div>

                <div class="c3-group">
                    <label>Security Deposit (₹)*</label>
                    <input type="number" name="deposit" value="{{ session.get('deposit', '') }}" min="0"
                        placeholder="e.g. 20000" required>
                </div>

                <div class="c3-group">
                    <label>Lock In Period (Months)*</label>
                    <input type="number" name="lock_in" value="{{ session.get('lock_in', '') }}" min="0" max="11"
                        title="Lock-in period cannot exceed 11 months" placeholder="e.g. 6" required>
                </div>

                <div class="c3-group">
                    <label>Notice Period (Months)*</label>
                    <input type="number" name="notice_period" value="{{ session.get('notice_period', '') }}" min="1"
                        max="2" title="Standard notice period must be 1 or 2 months" placeholder="1 or 2" required>
                </div>

                <div class="c3-group">
                    <label>Agreement Validity (Months)*</label>
                    <input type="number" name="validity" value="{{ session.get('validity', '') }}" min="1" max="11"
                        title="Unregistered agreements are legally valid for a maximum of 11 months"
                        placeholder="Max 11" required>
                </div>

                <div class="c3-group">
                    <label>Agreement Start Date*</label>
                    <input type="date" name="start_date" value="{{ session.get('start_date', '') }}" required>
                </div>

                <div class="c3-group">
                    <label>Created By*</label>
                    <select name="created_by" required>
                        <option value="" disabled {% if not session.get('created_by') %}selected{% endif %}>Select
                            Creator</option>
                        <option value="owner" {% if session.get('created_by')=='owner' %}selected{% endif %}>Owner
                        </option>
                        <option value="tenant" {% if session.get('created_by')=='tenant' %}selected{% endif %}>Tenant
                        </option>
                    </select>
                </div>

                <div class="c3-group">
                    <label>Enter Your Email Address*</label>
                    <input type="email" name="email" value="{{ session.get('email', '') }}"
                        pattern="[a-z0-9._%+\-]+@[a-z0-9.\-]+\.[a-z]{2,}$"
                        title="Please enter a valid email address (e.g. user@gmail.com)" placeholder="user@example.com"
                        required>
                    <div class="c3-helper">
                        You will receive rent agreement copy on this email address.
                    </div>
                </div>

                <div class="c3-footer">
                    <button type="submit" class="c3-btn">Save & Continue</button>
                </div>

            </form>

        </div>

    </div>
</div>
{% endblock %}
