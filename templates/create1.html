{% extends "layout.html" %}
{% block css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/create1.css') }}">
{% endblock %}

{% block body %}
<div class="c1-page">

    <div class="c1-header">
        <h1>Rent Agreement</h1>
        <div class="c1-line"></div>
    </div>

    <div class="c1-container">

        <div class="c1-steps">
            <div class="c1-step">
                <div class="c1-circle {% if session.get('owner_name') %}completed-circle{% endif %}"></div>
                <a href="{{ url_for('create') }}">Owner Details</a>
            </div>

            <div class="c1-step">
                <div class="c1-circle c1-active"></div>
                <a href="{{ url_for('create1') }}" class="c1-active-text">Tenant Details</a>
            </div>

            <div class="c1-step">
                <div class="c1-circle"></div>
                <a href="{{ url_for('create2') }}">Property Details</a>
            </div>

            <div class="c1-step">
                <div class="c1-circle"></div>
                <a href="{{ url_for('create3') }}">Agreement Terms</a>
            </div>

            <div class="c1-step">
                <div class="c1-circle"></div>
                <a href="{{ url_for('create4') }}">Annexures</a>
            </div>
        </div>

        <div class="c1-card">
            <h2>Who is renting the property?</h2>
            <div class="c1-subtitle">
                Fill in details of the tenant/lesser/renter.
            </div>

            <form action="{{ url_for('create1') }}" method="POST">
                <label>Full Name*</label>
                <input type="text" name="tenant_name" value="{{ session.get('tenant_name', '') }}"
                    style="text-transform: uppercase;" required>

                <label>Mobile Number*</label>
                <input type="tel" name="tenant_mobile" value="{{ session.get('tenant_mobile', '') }}"
                    pattern="[6-9][0-9]{9}" maxlength="10"
                    title="Please enter a valid 10-digit Indian mobile number starting with 6, 7, 8, or 9" required>

                <label>Address (Including Pincode)*</label>
                <input type="text" name="tenant_address" value="{{ session.get('tenant_address', '') }}"
                    placeholder="Enter permanent address with pincode" style="text-transform: uppercase;" minlength="10"
                    pattern=".*[1-9][0-9]{5}.*"
                    title="Please type your full address AND include a valid 6-digit Pincode (e.g., 176215)" required>

                <div class="c1-button">
                    <button type="submit">Save & Continue</button>
                </div>
            </form>
        </div>

    </div>
</div>
{% endblock %}
